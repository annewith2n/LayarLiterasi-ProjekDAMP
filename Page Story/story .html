<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Selection Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #eef0f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Container Utama Mobile */
        .phone-container {
            width: 100%;
            max-width: 430px; 
            background: #F1F1FA;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            padding-bottom: 30px;
            box-shadow: 0px 4px 25px rgba(0, 0, 0, 0.08);
        }

        /* Status Bar Atas */
        .status-bar {
            height: 47px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 28px;
            background: transparent;
        }

        .status-bar .time {
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            letter-spacing: -0.3px;
        }

        .status-bar .indicators {
            display: flex;
            gap: 6px;
            font-size: 12px;
            color: #000000;
        }

        /* Header App Bar */
        .header-container {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #313156;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            transition: transform 0.2s ease;
        }

        /* Efek klik mini pada tombol kembali */
        .back-btn:active {
            transform: scale(0.85);
        }

        .header-title {
            font-weight: 700;
            font-size: 16px;
            line-height: 21px;
            color: #313156;
        }

        /* Search Bar */
        .search-container {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .search-box {
            height: 48px;
            background: #F1F1FA;
            border: 1px solid #404070;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            transition: all 0.3s ease;
        }

        /* Efek nyala halus saat kolom search diklik */
        .search-box:focus-within {
            border-color: #634A94;
            box-shadow: 0px 0px 8px rgba(99, 74, 148, 0.2);
            transform: translateY(-1px);
        }

        .search-icon {
            color: #404070;
            font-size: 16px;
            margin-right: 12px;
            opacity: 0.7;
        }

        .search-input {
            border: none;
            background: transparent;
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 15px;
            color: #404070;
            outline: none;
        }

        .search-input::placeholder {
            color: #404070;
            opacity: 0.5;
        }

        /* Grid Cerita */
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            column-gap: 16px;
            row-gap: 24px;
            padding: 0 20px;
        }


        /* ================= ANIMASI INTERAKTIF BARU ================= */
        
        /* 1. Animasi 'Fade-In Pop Up' dari bawah saat aplikasi dibuka */
        @keyframes popInUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.93);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .story-card {
            background: #E3F0A9;
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.08);
            border-radius: 20px;
            padding: 12px 10px 14px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            
            /* Pasang animasi pembuka */
            animation: popInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            
            /* Set transisi untuk efek hover & active (membal) */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            
            /* Supaya saat ditekan di mobile tidak muncul warna highlight biru bawaan browser */
            -webkit-tap-highlight-color: transparent; 
        }

        /* 2. Efek Pop-Up Melayang (Saat kursor menyentuh kartu / Hover) */
        @media (hover: hover) {
            .story-card:hover {
                transform: translateY(-6px) scale(1.02);
                box-shadow: 0px 8px 20px rgba(49, 49, 86, 0.15);
            }
        }

        /* 3. Efek Membal Mengecil (Saat kartu beneran ditekan / di-klik) */
        .story-card:active {
            transform: scale(0.95) translateY(0);
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s ease; /* Respon instant pas ditekan */
        }

        /* 4. Efek Delay (Staggered): Kartu muncul berurutan bergantian biar estetik */
        .story-card:nth-child(1) { animation-delay: 0.05s; }
        .story-card:nth-child(2) { animation-delay: 0.12s; }
        .story-card:nth-child(3) { animation-delay: 0.19s; }
        .story-card:nth-child(4) { animation-delay: 0.26s; }
        .story-card:nth-child(5) { animation-delay: 0.33s; }
        .story-card:nth-child(6) { animation-delay: 0.40s; }

        /* ========================================================== */


        .card-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .image-wrapper {
            width: 100%;
            aspect-ratio: 168 / 160;
            border-radius: 16px;
            overflow: hidden;
        }

        .story-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Efek gambar sedikit nge-zoom mewah di dalam kotaknya saat di-hover */
        .story-card:hover .story-image {
            transform: scale(1.06);
        }

        .story-title {
            font-weight: 700;
            font-size: 15px;
            line-height: 20px;
            text-align: center;
            color: #313156;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Tombol Read */
        .read-button {
            width: 100%;
            height: 32px;
            background: linear-gradient(88.37deg, #2B2356 -3.68%, #634A94 103.37%);
            border-radius: 20px;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #ECF5C5;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s ease;
        }

        /* Optimasi Ukuran Layar HP Kecil */
        @media (max-width: 360px) {
            .stories-grid {
                column-gap: 10px;
                row-gap: 20px;
                padding: 0 12px;
            }
            .story-title {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="status-bar">
            <div class="time">9:41</div>
            <div class="indicators">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <div class="header-container">
            <button class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="header-title">Choose a story you’d like to read!</h1>
        </div>

        <div class="search-container">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Search" class="search-input">
            </div>
        </div>

        <div class="stories-grid">
            
            <div class="story-card">
                <div class="card-content">
                    <div class="image-wrapper">
                        <img src="timun mas.png" alt="Timun Mas" class="story-image">
                    </div>
                    <h2 class="story-title">Timun Mas</h2>
                    <button class="read-button">Read</button>
                </div>
            </div>

            <div class="story-card">
                <div class="card-content">
                    <div class="image-wrapper">
                        <img src="keong mas.png" alt="Keong Mas" class="story-image">
                    </div>
                    <h2 class="story-title">Keong Mas</h2>
                    <button class="read-button">Read</button>
                </div>
            </div>

            <div class="story-card">
                <div class="card-content">
                    <div class="image-wrapper">
                        <img src="malin kundang.jpeg" alt="Malin Kundang" class="story-image">
                    </div>
                    <h2 class="story-title">Malin Kundang</h2>
                    <button class="read-button">Read</button>
                </div>
            </div>

            <div class="story-card">
                <div class="card-content">
                    <div class="image-wrapper">
                        <img src="joko kendil.jpeg" alt="Joko Kendil" class="story-image">
                    </div>
                    <h2 class="story-title">Joko Kendil</h2>
                    <button class="read-button">Read</button>
                </div>
            </div>

            <div class="story-card">
                <div class="card-content">
                    <div class="image-wrapper">
                        <img src="sangkuriang.jpeg" alt="Sangkuriang" class="story-image">
                    </div>
                    <h2 class="story-title">Sangkuriang</h2>
                    <button class="read-button">Read</button>
                </div>
            </div>

            <div class="story-card">
                <div class="card-content">
                    <div class="image-wrapper">
                        <img src="si toba.jpeg" alt="Si Toba" class="story-image">
                    </div>
                    <h2 class="story-title">Si Toba</h2>
                    <button class="read-button">Read</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
